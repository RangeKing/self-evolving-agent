name: Bug Report
description: Report a bug, regression, or broken workflow in the skill or benchmark setup.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A concise description of the bug or regression.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What were you trying to do?
      placeholder: Task type, workflow area, or module involved.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: How can someone reproduce the issue?
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - README / docs
        - Skill workflow
        - Capability map
        - Curriculum / evaluator
        - Benchmark harness
        - Hook / installation
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Output
      description: Paste useful logs, benchmark summaries, or command output.
      render: text
