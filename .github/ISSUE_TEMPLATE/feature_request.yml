name: Feature Request
description: Suggest an improvement to the skill, docs, workflow, or benchmark system.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation are you trying to solve?
      placeholder: Describe the current gap or friction.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Improvement
      description: What should change?
      placeholder: Describe the workflow, docs, benchmark, or module improvement you want.
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Why It Matters
      description: Why would this make the project materially better?
      placeholder: Tie it to capability evolution, usability, or evaluation quality.
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Expected Impact
      options:
        - Small polish
        - Moderate workflow improvement
        - Major capability improvement
        - Benchmark / evaluation improvement
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Optional. What other approaches did you consider?
