name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Run structural validation
        run: python3 scripts/run-evals.py .

      - name: Bootstrap workspace smoke test
        run: |
          ./scripts/bootstrap-workspace.sh /tmp/self-evolving-agent-ci --force
          test -f /tmp/self-evolving-agent-ci/LEARNING_AGENDA.md
          test -f /tmp/self-evolving-agent-ci/CAPABILITIES.md

      - name: Benchmark runner help smoke test
        run: python3 scripts/run-benchmark.py --help
